<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links - Lego Minifigure How-To</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; }
        header { position: fixed; top:0; left:0; width:100%; background:#ff0000; color:#fff; padding:10px; box-sizing:border-box; }
        #logo { height:40px; vertical-align: middle; display:inline-block; margin-right:10px; }
        .hamburger { cursor:pointer; font-size:24px; }
        nav { display:none; background:#ff0000; position:absolute; top:60px; left:0; width:200px; }
        nav a { display:block; color:#fff; text-decoration:none; padding:10px; }
        nav a:hover { background:#ad0000ab; }
        main { padding:60px 20px 20px; }
    </style>
    <script>
        function toggleMenu(){
            var nav = document.getElementById('nav');
            if(nav.style.display === 'block') nav.style.display = 'none';
            else nav.style.display = 'block';
        }
        document.addEventListener('click', function(e){
            if(!e.target.closest('header')){
                document.getElementById('nav').style.display = 'none';
            }
        });
    </script>
</head>
<body>
    <header>
        <a href="index.html"><img id="logo" src="lego.png" alt="Lego Logo"></a>
        <span class="hamburger" onclick="toggleMenu()">☰</span>
        <nav id="nav">
            <a href="index.html">Home</a>
            <a href="links.html">Links</a>
            <a href="howto.html">How To</a>
        </nav>
    </header>
    <main>
        <h1>Helpful Links</h1>
        <ul>
            <li><a href="https://www.lego.com" target="_blank">Official Lego Site</a></li>
            <li><a href="https://bricklink.com" target="_blank">BrickLink - parts marketplace</a></li>
            <li><a href="https://rebrickable.com" target="_blank">Rebrickable - build ideas</a></li>
        </ul>
    </main>
</body>
</html>
